<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kisan Login - 45Degrees</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: 'Arial', sans-serif; 
      background: linear-gradient(135deg, #ff9933, #ffffff, #138808);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-box {
      background: white;
      padding: 40px 30px;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      text-align: center;
      max-width: 400px;
      width: 100%;
    }
    .login-box h1 {
      color: #138808;
      font-size: 28px;
      margin-bottom: 10px;
    }
    .login-box p {
      color: #666;
      margin-bottom: 30px;
      font-size: 16px;
    }
    .btn-kisan {
      display: inline-block;
      background: #ff9933;
      color: white;
      padding: 15px 40px;
      border-radius: 50px;
      text-decoration: none;
      font-size: 18px;
      font-weight: bold;
      transition: 0.3s;
      border: none;
      cursor: pointer;
    }
    .btn-kisan:hover {
      background: #e6821a;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(255,153,51,0.4);
    }
    .logo {
      width: 80px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <img src="https://45degrees.in/logo.png" alt="45Degrees Logo" class="logo">
    <h1>किसान पोर्टल</h1>
    <p>अपनी सेवा चुनने के लिए नीचे क्लिक करें</p>
    <a href="https://docs.google.com/forms/d/1f_fYcrL3te4zpAWYnylZW5Gei8BHbDGr9uDTy_hkZvM/viewform" 
       class="btn-kisan" 
       target="_blank">
       किसान लॉगिन करें
    </a>
  </div>
</body>
</html>
